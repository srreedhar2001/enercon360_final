<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Purchase - Enercon 360</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/navigation.js"></script>
  <link rel="icon" href="/favicon.ico">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Product Purchase Management">
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navigation-container"></div>

  <main class="container mx-auto px-4 py-8 pt-24">
    <div class="max-w-full mx-auto">
      <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-6">
          <h1 class="text-2xl font-bold text-gray-800">Product Purchase Records</h1>
          <button id="addPurchaseBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
            + Add Purchase
          </button>
        </div>

        <!-- Filters -->
        <div class="mb-6 flex flex-wrap gap-4 items-end">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">From Date</label>
            <input type="date" id="fromDate" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">To Date</label>
            <input type="date" id="toDate" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
            <select id="categoryFilter" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">All Categories</option>
            </select>
          </div>
          <button id="filterBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
            Apply Filter
          </button>
          <button id="resetBtn" class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 transition">
            Reset
          </button>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
          <div class="bg-blue-50 rounded-lg p-4 border border-blue-200">
            <div class="text-sm text-blue-600 mb-1">Total Purchases</div>
            <div id="totalPurchases" class="text-2xl font-bold text-blue-900">0</div>
          </div>
          <div class="bg-green-50 rounded-lg p-4 border border-green-200">
            <div class="text-sm text-green-600 mb-1">Total Value</div>
            <div id="totalValue" class="text-2xl font-bold text-green-900">₹0</div>
          </div>
          <div class="bg-yellow-50 rounded-lg p-4 border border-yellow-200">
            <div class="text-sm text-yellow-600 mb-1">Pending Payment</div>
            <div id="pendingPayment" class="text-2xl font-bold text-yellow-900">₹0</div>
          </div>
          <div class="bg-purple-50 rounded-lg p-4 border border-purple-200">
            <div class="text-sm text-purple-600 mb-1">Total Paid</div>
            <div id="totalPaid" class="text-2xl font-bold text-purple-900">₹0</div>
          </div>
        </div>

        <div id="loadingSpinner" class="hidden text-center py-8">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
          <p class="text-gray-600 mt-2">Loading data...</p>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No.</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product Name</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Qty</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Product Value (₹)</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Courier (₹)</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Total (₹)</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Advance (₹)</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Balance (₹)</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Delivered</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Expected Delivery</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody id="dataTableBody" class="bg-white divide-y divide-gray-200">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Add/Edit Purchase Modal -->
  <div id="purchaseModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-2xl shadow-lg rounded-md bg-white">
      <div class="flex justify-between items-center mb-4">
        <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Add Purchase</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
      </div>
      
      <form id="purchaseForm" class="space-y-4">
        <input type="hidden" id="purchaseId" />
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
          <input type="text" id="productName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
          <select id="categorySelect" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">Select Category</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity *</label>
            <input type="number" id="qty" min="1" value="1" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Product Value (₹) *</label>
            <input type="number" id="productsValue" step="0.01" min="0" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Advance Payment (₹)</label>
            <input type="number" id="advancePayment" step="0.01" min="0" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Balance Payment (₹)</label>
            <input type="number" id="balancePayment" step="0.01" min="0" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Courier Charges (₹)</label>
          <input type="number" id="courierCharges" step="0.01" min="0" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Advance Payment Date</label>
            <input type="date" id="advancePaymentDate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Expected Delivery Date</label>
            <input type="date" id="expectedDateOfDelivery" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Delivered Date</label>
          <input type="date" id="deliveredDate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <div>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="isDeliver" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" />
            <span class="text-sm font-medium text-gray-700">Mark as Delivered</span>
          </label>
        </div>

        <div class="flex gap-2 justify-end pt-4">
          <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 transition">
            Cancel
          </button>
          <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
            Save
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let allPurchases = [];
    let filteredPurchases = [];
    let categories = [];

    document.addEventListener('DOMContentLoaded', async () => {
      try { await NavigationLoader.loadNavigation(); } catch (_) {}
      
      const token = localStorage.getItem('token') || localStorage.getItem('authToken');
      if (!token) { window.location.href = '/login.html'; return; }

      await loadCategories();
      await loadData();

      // Event listeners
      document.getElementById('addPurchaseBtn').addEventListener('click', () => openModal());
      document.getElementById('filterBtn').addEventListener('click', applyFilter);
      document.getElementById('resetBtn').addEventListener('click', resetFilter);
      document.getElementById('purchaseForm').addEventListener('submit', handleSubmit);
    });

    async function loadCategories() {
      const token = localStorage.getItem('token') || localStorage.getItem('authToken');
      try {
        const res = await fetch('/api/products/categories', { 
          headers: { 'Authorization': `Bearer ${token}` } 
        });
        
        if (res.ok) {
          const json = await res.json();
          categories = json.categories || [];
          
          const categorySelect = document.getElementById('categorySelect');
          const categoryFilter = document.getElementById('categoryFilter');
          
          // Clear existing options except the first one
          categorySelect.innerHTML = '<option value="">Select Category</option>';
          categoryFilter.innerHTML = '<option value="">All Categories</option>';
          
          categories.forEach(cat => {
            categorySelect.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            categoryFilter.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
          });
        }
      } catch (error) {
        console.error('Error loading categories:', error);
      }
    }

    async function loadData() {
      const token = localStorage.getItem('token') || localStorage.getItem('authToken');
      const loader = document.getElementById('loadingSpinner');
      const tbody = document.getElementById('dataTableBody');

      loader.classList.remove('hidden');

      try {
        const res = await fetch('/api/product-purchases', { 
          headers: { 'Authorization': `Bearer ${token}` } 
        });
        
        if (!res.ok) throw new Error('Failed to fetch data');
        
        const json = await res.json();
        allPurchases = Array.isArray(json.data) ? json.data : [];
        filteredPurchases = [...allPurchases];
        
        loader.classList.add('hidden');
        updateSummary();
        renderTable();

      } catch (error) {
        console.error('Error loading data:', error);
        loader.classList.add('hidden');
        tbody.innerHTML = '<tr><td colspan="13" class="text-center text-red-600 py-8">Failed to load purchase data.</td></tr>';
      }
    }

    function applyFilter() {
      const fromDate = document.getElementById('fromDate').value;
      const toDate = document.getElementById('toDate').value;
      const categoryId = document.getElementById('categoryFilter').value;

      filteredPurchases = allPurchases.filter(item => {
        const createdDate = new Date(item.created_at);
        const from = fromDate ? new Date(fromDate) : null;
        const to = toDate ? new Date(toDate) : null;

        if (from && createdDate < from) return false;
        if (to && createdDate > to) return false;
        if (categoryId && item.ProductCategoryID != categoryId) return false;
        
        return true;
      });

      updateSummary();
      renderTable();
    }

    function resetFilter() {
      document.getElementById('fromDate').value = '';
      document.getElementById('toDate').value = '';
      document.getElementById('categoryFilter').value = '';
      filteredPurchases = [...allPurchases];
      updateSummary();
      renderTable();
    }

    function updateSummary() {
      const totalPurchases = filteredPurchases.length;
      const totalValue = filteredPurchases.reduce((sum, p) => sum + Number(p.productsValue || 0) + Number(p.CourierCharges || 0), 0);
      const totalPaid = filteredPurchases.reduce((sum, p) => sum + Number(p.advancePayment || 0) + Number(p.balancePayment || 0), 0);
      const pendingPayment = totalValue - totalPaid;

      document.getElementById('totalPurchases').textContent = totalPurchases;
      document.getElementById('totalValue').textContent = '₹' + totalValue.toLocaleString('en-IN');
      document.getElementById('pendingPayment').textContent = '₹' + pendingPayment.toLocaleString('en-IN');
      document.getElementById('totalPaid').textContent = '₹' + totalPaid.toLocaleString('en-IN');
    }

    function renderTable() {
      const tbody = document.getElementById('dataTableBody');

      if (filteredPurchases.length === 0) {
        tbody.innerHTML = '<tr><td colspan="13" class="text-center text-gray-600 py-8">No purchase records found.</td></tr>';
        return;
      }

      tbody.innerHTML = filteredPurchases.map((item, idx) => {
        const totalCost = Number(item.productsValue || 0) + Number(item.CourierCharges || 0);
        const totalPaid = Number(item.advancePayment || 0) + Number(item.balancePayment || 0);
        const pending = totalCost - totalPaid;
        
        const categoryName = categories.find(c => c.id == item.ProductCategoryID)?.name || 'N/A';
        
        let status = 'Unpaid';
        let statusClass = 'bg-red-100 text-red-800';
        if (totalPaid >= totalCost) {
          status = 'Paid';
          statusClass = 'bg-green-100 text-green-800';
        } else if (totalPaid > 0) {
          status = 'Partial';
          statusClass = 'bg-yellow-100 text-yellow-800';
        }

        const isDelivered = item.isDeliver === 1 || item.isDeliver === true;
        const deliverIcon = isDelivered 
          ? '<span class="inline-flex items-center px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">✓ Yes</span>'
          : '<span class="inline-flex items-center px-2 py-1 text-xs font-semibold rounded-full bg-gray-100 text-gray-600">✗ No</span>';

        if (item.deliveredDate) {
          status = 'Delivered';
          statusClass = 'bg-blue-100 text-blue-800';
        }
        
        return `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">${idx + 1}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">${item.ProductName || 'N/A'}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-700">${categoryName}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-center text-gray-700">${item.Qty || 0}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-right text-gray-900">₹${Number(item.productsValue || 0).toLocaleString('en-IN')}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-right text-gray-700">₹${Number(item.CourierCharges || 0).toLocaleString('en-IN')}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-right font-semibold text-gray-900">₹${totalCost.toLocaleString('en-IN')}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-right text-gray-700">₹${Number(item.advancePayment || 0).toLocaleString('en-IN')}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-right font-semibold ${pending > 0 ? 'text-red-600' : 'text-green-600'}">₹${pending.toLocaleString('en-IN')}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-center">
            <span class="px-2 py-1 text-xs font-semibold rounded-full ${statusClass}">${status}</span>
          </td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-center">${deliverIcon}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-700">${item.expectedDateOfDelivery ? new Date(item.expectedDateOfDelivery).toLocaleDateString('en-IN') : '-'}</td>
          <td class="px-4 py-3 whitespace-nowrap text-sm text-center space-x-2">
            <button onclick="editPurchase(${item.id})" class="text-indigo-600 hover:text-indigo-900 font-medium">Edit</button>
            <button onclick="deletePurchase(${item.id})" class="text-red-600 hover:text-red-900 font-medium">Delete</button>
          </td>
        </tr>
        `;
      }).join('');
    }

    function openModal(purchase = null) {
      document.getElementById('purchaseModal').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = purchase ? 'Edit Purchase' : 'Add Purchase';
      
      if (purchase) {
        document.getElementById('purchaseId').value = purchase.id;
        document.getElementById('productName').value = purchase.ProductName;
        document.getElementById('categorySelect').value = purchase.ProductCategoryID;
        document.getElementById('qty').value = purchase.Qty;
        document.getElementById('productsValue').value = purchase.productsValue;
        document.getElementById('advancePayment').value = purchase.advancePayment;
        document.getElementById('balancePayment').value = purchase.balancePayment;
        document.getElementById('courierCharges').value = purchase.CourierCharges;
        
        // Format dates to YYYY-MM-DD using local timezone
        const formatDateForInput = (dateStr) => {
          if (!dateStr) return '';
          const date = new Date(dateStr);
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        };
        
        document.getElementById('advancePaymentDate').value = formatDateForInput(purchase.advancePaymentDate);
        document.getElementById('expectedDateOfDelivery').value = formatDateForInput(purchase.expectedDateOfDelivery);
        document.getElementById('deliveredDate').value = formatDateForInput(purchase.deliveredDate);
        
        document.getElementById('isDeliver').checked = purchase.isDeliver === 1 || purchase.isDeliver === true;
      } else {
        document.getElementById('purchaseForm').reset();
        document.getElementById('purchaseId').value = '';
      }
    }

    function closeModal() {
      document.getElementById('purchaseModal').classList.add('hidden');
      document.getElementById('purchaseForm').reset();
    }

    async function handleSubmit(e) {
      e.preventDefault();
      
      const token = localStorage.getItem('token') || localStorage.getItem('authToken');
      const purchaseId = document.getElementById('purchaseId').value;
      
      const data = {
        ProductName: document.getElementById('productName').value,
        ProductCategoryID: document.getElementById('categorySelect').value,
        Qty: document.getElementById('qty').value,
        productsValue: document.getElementById('productsValue').value,
        advancePayment: document.getElementById('advancePayment').value,
        balancePayment: document.getElementById('balancePayment').value,
        CourierCharges: document.getElementById('courierCharges').value,
        advancePaymentDate: document.getElementById('advancePaymentDate').value || null,
        expectedDateOfDelivery: document.getElementById('expectedDateOfDelivery').value || null,
        deliveredDate: document.getElementById('deliveredDate').value || null,
        isDeliver: document.getElementById('isDeliver').checked ? 1 : 0
      };

      try {
        const url = purchaseId ? `/api/product-purchases/${purchaseId}` : '/api/product-purchases';
        const method = purchaseId ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
          method,
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error('Failed to save purchase');

        alert(purchaseId ? 'Purchase updated successfully' : 'Purchase added successfully');
        closeModal();
        await loadData();
      } catch (error) {
        console.error('Error saving purchase:', error);
        alert('Failed to save purchase');
      }
    }

    async function editPurchase(id) {
      const purchase = allPurchases.find(p => p.id === id);
      if (purchase) {
        openModal(purchase);
      }
    }

    async function deletePurchase(id) {
      if (!confirm('Are you sure you want to delete this purchase record?')) return;

      const token = localStorage.getItem('token') || localStorage.getItem('authToken');

      try {
        const res = await fetch(`/api/product-purchases/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Failed to delete purchase');

        alert('Purchase deleted successfully');
        await loadData();
      } catch (error) {
        console.error('Error deleting purchase:', error);
        alert('Failed to delete purchase');
      }
    }
  </script>
</body>
</html>
